services:
  nexa.api:
    image: ${DOCKER_REGISTRY-}nexaapi
    build:
      context: .
      dockerfile: src/Nexa.API/Dockerfile
    env_file:
      - .env
    depends_on:
      - db
  
  db:
    image: postgres:18.3
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data: